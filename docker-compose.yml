services:
  # Laravel Backend API
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./backend/php.ini:/usr/local/etc/php/conf.d/uploads.ini
    depends_on:
      - db
      - mailpit
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html/public
      - APP_NAME="DealMindanao APP"
    networks:
      - dealmindanao

  # MySQL Database
  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dealmindanao
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - dealmindanao

  # Mailpit - Local email catcher (inbox at http://localhost:8025)
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"   # Web UI
      - "1025:1025"   # SMTP
    networks:
      - dealmindanao

  # Frontend Development Server
  frontend:
    image: node:20
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - dealmindanao

volumes:
  db_data:

networks:
  dealmindanao:
    driver: bridge