services:
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend:/var/www/html
      - ./backend/php.ini:/usr/local/etc/php/conf.d/uploads.ini
      - storage_data:/var/www/html/storage/app
    depends_on:
      db:
        condition: service_healthy
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html/public
    networks:
      - dealmindanao

  queue:
    build:
      context: ./backend
      dockerfile: ../Dockerfile
    restart: always
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - ./backend:/var/www/html
      - ./backend/php.ini:/usr/local/etc/php/conf.d/uploads.ini
      - storage_data:/var/www/html/storage/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dealmindanao

  db:
    image: mysql:8.0
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dealmindanao

volumes:
  db_data:
  storage_data:

networks:
  dealmindanao:
    driver: bridge
