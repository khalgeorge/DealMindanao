<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop Deals - DealMindanao</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/src/css/app.css">
</head>
<body class="bg-gray-50">
  <div id="navbar"></div>

  <main class="page-shell py-8">
    <div class="mb-8">
      <h1 class="text-3xl font-bold text-gray-900">Shop Deals</h1>
      <p class="text-gray-600 mt-2">Browse curated hardware and equipment deals from trusted local sellers.</p>
    </div>

    <div class="flex flex-col lg:flex-row gap-8">
      <!-- Sidebar Filters: Desktop -->
      <aside class="w-full lg:w-64 space-y-8 flex-shrink-0">
        <!-- Search -->
        <div>
          <label class="block mb-2 font-bold uppercase tracking-tight text-xs text-gray-500">Search</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
              </svg>
            </span>
            <input type="text" id="search-input" class="input pl-10 h-11" placeholder="Search keywords...">
          </div>
        </div>

        <!-- Category -->
        <div>
          <label class="block mb-3 font-bold uppercase tracking-tight text-xs text-gray-500">Category</label>
          <div id="category-filters" class="space-y-2">
            <label class="flex items-center group cursor-pointer">
              <input type="checkbox" value="electronics" class="w-4 h-4 text-brand-600 rounded border-gray-300 focus:ring-brand-500">
              <span class="ml-3 text-sm text-gray-700 group-hover:text-brand-600">Electronics</span>
            </label>
            <label class="flex items-center group cursor-pointer">
              <input type="checkbox" value="fashion" class="w-4 h-4 text-brand-600 rounded border-gray-300 focus:ring-brand-500">
              <span class="ml-3 text-sm text-gray-700 group-hover:text-brand-600">Fashion</span>
            </label>
            <label class="flex items-center group cursor-pointer">
              <input type="checkbox" value="food" class="w-4 h-4 text-brand-600 rounded border-gray-300 focus:ring-brand-500">
              <span class="ml-3 text-sm text-gray-700 group-hover:text-brand-600">Food & Drinks</span>
            </label>
            <label class="flex items-center group cursor-pointer">
              <input type="checkbox" value="crafts" class="w-4 h-4 text-brand-600 rounded border-gray-300 focus:ring-brand-500">
              <span class="ml-3 text-sm text-gray-700 group-hover:text-brand-600">Native Crafts</span>
            </label>
          </div>
        </div>

        <!-- Sorting -->
        <div>
          <label class="block mb-2 font-bold uppercase tracking-tight text-xs text-gray-500">Sort By</label>
          <select id="sort-select" class="input h-11">
            <option value="newest">Newest First</option>
            <option value="price-low">Price: Low to High</option>
            <option value="price-high">Price: High to Low</option>
            <option value="popular">Most Popular</option>
          </select>
        </div>

        <!-- Reset Filters Button -->
        <button id="reset-filters-btn" class="btn-outline w-full">
          <svg class="w-4 h-4 mr-2 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
          </svg>
          Reset Filters
        </button>
      </aside>

      <!-- Results Grid -->
      <div class="flex-1">
        <!-- Grid Header -->
        <div class="flex items-center justify-between mb-6">
          <p class="text-sm text-gray-500"><span id="result-count" class="font-bold text-gray-900">0</span> products found</p>
        </div>

        <!-- Skeleton Loading (Hidden by default) -->
        <div id="loading-skeleton" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
          <div class="animate-pulse">
            <div class="bg-gray-200 aspect-[4/5] rounded-lg mb-4"></div>
            <div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div>
            <div class="h-6 bg-gray-200 rounded w-1/4"></div>
          </div>
          <div class="animate-pulse">
            <div class="bg-gray-200 aspect-[4/5] rounded-lg mb-4"></div>
            <div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div>
            <div class="h-6 bg-gray-200 rounded w-1/4"></div>
          </div>
          <div class="animate-pulse">
            <div class="bg-gray-200 aspect-[4/5] rounded-lg mb-4"></div>
            <div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div>
            <div class="h-6 bg-gray-200 rounded w-1/4"></div>
          </div>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden text-center py-20 card border-dashed border-2">
          <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
          </div>
          <h2 id="empty-heading" class="text-xl font-bold text-gray-900 mb-2">No deals available yet</h2>
          <p id="empty-subtext" class="text-gray-500 mb-8">We're building our catalog. Check back soon!</p>
          <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <button id="clear-filters" class="btn-primary hidden">Clear All Filters</button>
            <a id="cta-home" href="/index.html" class="btn-outline">Back to Home</a>
          </div>
        </div>

        <!-- Products Grid -->
        <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
          <!-- Dynamic products injected here -->
        </div>
        
        <!-- Pagination Controls -->
        <div id="pagination-controls" class="mt-8 flex flex-col sm:flex-row items-center justify-between gap-4">
          <div class="flex items-center gap-3">
            <label class="text-sm text-gray-600">Show:</label>
            <select id="rows-per-page" class="input h-9 w-20">
              <option value="8">8</option>
              <option value="12">12</option>
              <option value="16">16</option>
              <option value="24">24</option>
              <option value="all">All</option>
            </select>
            <span class="text-sm text-gray-600">per page</span>
          </div>

          <div class="flex items-center gap-2">
            <button id="prev-page" class="px-3 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
              </svg>
            </button>
            <span id="page-info" class="text-sm text-gray-600 px-4">Page 1 of 1</span>
            <button id="next-page" class="px-3 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
              </svg>
            </button>
          </div>
        </div>
        
        <!-- Footer Note -->
        <div class="mt-12 text-center">
          <p class="text-sm text-gray-500">Prices and availability are subject to confirmation after order review.</p>
        </div>
      </div>
    </div>
  </main>

  <div id="footer"></div>

  <!-- Product Detail Modal -->
  <div id="product-modal" class="hidden fixed inset-0 z-50 overflow-y-auto">
    <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:p-0">
      <!-- Background overlay -->
      <div class="fixed inset-0 transition-opacity bg-gray-500 bg-opacity-75" id="modal-backdrop"></div>

      <!-- Modal panel -->
      <div class="relative inline-block overflow-hidden text-left align-bottom transition-all transform bg-white rounded-lg shadow-xl sm:my-8 sm:align-middle sm:max-w-4xl sm:w-full">
        <button id="close-modal" class="absolute top-4 right-4 z-10 p-2 text-gray-400 hover:text-gray-600 bg-white rounded-full shadow-sm">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>

        <div id="modal-content" class="p-6 sm:p-8">
          <!-- Dynamic content loaded here -->
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/js/layout.js"></script>
  <script type="module">
    console.log('Shop page script loaded');
    
    import { formatPrice, showToast } from '/src/js/utils.js';
    import api from '/src/js/api.js';

    console.log('Imports successful');

    let allProducts = [];
    let filteredProducts = [];
    let currentPage = 1;
    let rowsPerPage = 8;
    
    const grid = document.getElementById('products-grid');
    const skeleton = document.getElementById('loading-skeleton');
    const emptyState = document.getElementById('empty-state');
    const countLabel = document.getElementById('result-count');
    const modal = document.getElementById('product-modal');
    const modalContent = document.getElementById('modal-content');
    
    console.log('Elements found:', { grid, skeleton, emptyState, countLabel });

    async function loadProducts() {
      console.log('=== loadProducts called ===');
      grid.innerHTML = '';
      skeleton.classList.remove('hidden');
      emptyState.classList.add('hidden');

      try {
        // Import API client
        const { products: productsAPI } = await import('/src/js/api.js');
        
        // Fetch products from backend API
        const response = await productsAPI.getAll();
        
        // Transform API data to match frontend format
        const products = response.data.map(product => ({
          id: product.id,
          name: product.name,
          partner: product.company?.name,
          price: parseFloat(product.price),
          discount: parseFloat(product.discount || 0),
          category: product.category?.slug,
          image: product.images && product.images.length > 0 
            ? `http://localhost:8000${product.images[0]}` 
            : 'https://via.placeholder.com/400',
          description: product.description,
          slug: product.slug
        }));

        allProducts = products;
        console.log('Products loaded from API:', products.length);
        skeleton.classList.add('hidden');
        renderProducts(allProducts);
      } catch (error) {
        console.error('Error loading products:', error);
        skeleton.classList.add('hidden');
        emptyState.classList.remove('hidden');
        document.getElementById('empty-heading').textContent = 'Unable to load products';
        document.getElementById('empty-subtext').textContent = 'Failed to connect. Please try again later.';
        document.getElementById('clear-filters').classList.add('hidden');
        document.getElementById('cta-home').classList.remove('hidden');
      }
    }

    function renderProducts(products) {
      filteredProducts = products;
      countLabel.textContent = products.length;
      
      if (products.length === 0) {
        grid.innerHTML = '';
        emptyState.classList.remove('hidden');
        document.getElementById('pagination-controls').classList.add('hidden');

        const isCatalogEmpty = allProducts.length === 0;
        document.getElementById('empty-heading').textContent = isCatalogEmpty
          ? 'No deals available yet'
          : 'No results found';
        document.getElementById('empty-subtext').textContent = isCatalogEmpty
          ? "We're building our catalog. New deals from local Mindanao partners are coming soon."
          : 'Try different keywords or adjust your filters.';
        document.getElementById('clear-filters').classList.toggle('hidden', isCatalogEmpty);
        document.getElementById('cta-home').classList.toggle('hidden', !isCatalogEmpty);
        return;
      }

      emptyState.classList.add('hidden');
      document.getElementById('pagination-controls').classList.remove('hidden');
      
      // Pagination logic
      const totalPages = rowsPerPage === 'all' ? 1 : Math.ceil(products.length / rowsPerPage);
      const startIndex = rowsPerPage === 'all' ? 0 : (currentPage - 1) * rowsPerPage;
      const endIndex = rowsPerPage === 'all' ? products.length : startIndex + rowsPerPage;
      const paginatedProducts = products.slice(startIndex, endIndex);
      
      // Update pagination controls
      document.getElementById('prev-page').disabled = currentPage === 1;
      document.getElementById('next-page').disabled = currentPage === totalPages;
      document.getElementById('page-info').textContent = `Page ${currentPage} of ${totalPages}`;

      grid.innerHTML = paginatedProducts.map(product => {
        const salePrice = product.discount > 0 ? product.price * (1 - product.discount / 100) : product.price;
        return `
          <div class="product-card group flex flex-col h-full animate-fade-in">
            <div class="relative h-56 bg-white p-3 overflow-hidden rounded-t-xl flex-shrink-0 cursor-pointer"
                 onclick="window.viewProductModal(${product.id})">
              <img src="${product.image || 'https://via.placeholder.com/400'}"
                   alt="${product.name}"
                   class="w-full h-full object-contain transition-transform duration-500 group-hover:scale-105">
              <div class="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition-colors duration-300"></div>
            </div>
            <div class="border-t border-gray-200"></div>
            <div class="px-6 pt-4 pb-8 flex-1 flex flex-col gap-3">
              ${product.partner ? `<p class="text-brand-600 text-[10px] font-black uppercase tracking-widest leading-none">${product.partner}</p>` : ''}
              <h3 class="text-sm font-bold text-gray-900 line-clamp-2 leading-snug">${product.name}</h3>
              <div class="flex items-center gap-2">
                <span class="text-lg font-black text-gray-900">${formatPrice(salePrice)}</span>
                ${product.discount > 0 ? `<span class="text-xs text-gray-400 line-through">${formatPrice(product.price)}</span>` : ''}
              </div>
              <div class="flex gap-2 mt-auto pt-1">
                <button onclick="window.viewProductModal(${product.id})" class="btn-primary flex-1 btn-sm text-xs">
                  <svg class="w-3.5 h-3.5 inline-block mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                  </svg>
                  View
                </button>
                <button onclick="window.addToCartFromShop(${product.id})" class="p-2.5 bg-brand-600 hover:bg-brand-700 text-white rounded-lg transition-colors shadow-sm flex-shrink-0">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    // Interactive Filtering
    const searchInput = document.getElementById('search-input');
    searchInput.addEventListener('input', applyFilters);

    document.querySelectorAll('#category-filters input').forEach(cb => {
      cb.addEventListener('change', applyFilters);
    });

    document.getElementById('sort-select').addEventListener('change', applyFilters);

    function applyFilters() {
      const query = searchInput.value.toLowerCase();
      const selectedCategories = Array.from(document.querySelectorAll('#category-filters input:checked')).map(cb => cb.value);
      const sortValue = document.getElementById('sort-select').value;

      let filtered = allProducts.filter(p => {
        const matchesSearch = p.name.toLowerCase().includes(query) || 
                             (p.partner && p.partner.toLowerCase().includes(query)) ||
                             (p.description && p.description.toLowerCase().includes(query));
        const matchesCategory = selectedCategories.length === 0 || selectedCategories.includes(p.category);
        return matchesSearch && matchesCategory;
      });

      // Sorting
      if (sortValue === 'price-low') {
        filtered.sort((a,b) => {
          const priceA = a.price * (1 - (a.discount / 100));
          const priceB = b.price * (1 - (b.discount / 100));
          return priceA - priceB;
        });
      }
      if (sortValue === 'price-high') {
        filtered.sort((a,b) => {
          const priceA = a.price * (1 - (a.discount / 100));
          const priceB = b.price * (1 - (b.discount / 100));
          return priceB - priceA;
        });
      }
      if (sortValue === 'newest') {
        filtered.sort((a,b) => b.id - a.id);
      }

      currentPage = 1; // Reset to first page when filtering
      renderProducts(filtered);
    }

    document.getElementById('clear-filters').addEventListener('click', resetFilters);
    document.getElementById('reset-filters-btn').addEventListener('click', resetFilters);

    function resetFilters() {
      searchInput.value = '';
      document.querySelectorAll('#category-filters input').forEach(cb => cb.checked = false);
      document.getElementById('sort-select').value = 'newest';
      currentPage = 1;
      renderProducts(allProducts);
    }

    // Pagination controls
    document.getElementById('prev-page').addEventListener('click', () => {
      if (currentPage > 1) {
        currentPage--;
        renderProducts(filteredProducts);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });

    document.getElementById('next-page').addEventListener('click', () => {
      const totalPages = Math.ceil(filteredProducts.length / rowsPerPage);
      if (currentPage < totalPages) {
        currentPage++;
        renderProducts(filteredProducts);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });

    document.getElementById('rows-per-page').addEventListener('change', (e) => {
      rowsPerPage = e.target.value === 'all' ? 'all' : parseInt(e.target.value);
      currentPage = 1;
      renderProducts(filteredProducts);
    });

    // Modal controls
    window.viewProductModal = (productId) => {
      const product = allProducts.find(p => p.id === productId);
      if (!product) return;

      const salePrice = product.discount > 0 ? product.price * (1 - product.discount / 100) : product.price;
      const productImage = product.image || 'https://via.placeholder.com/600';

      modalContent.innerHTML = `
        <div class="grid md:grid-cols-2 gap-8">
          <div>
            <div class="aspect-square bg-gray-100 rounded-lg overflow-hidden">
              <img src="${productImage}" alt="${product.name}" class="w-full h-full object-cover">
            </div>
          </div>
          
          <div class="flex flex-col">
            <div class="mb-6">
              <h2 class="text-3xl font-bold text-gray-900 mb-4">${product.name}</h2>
              
              ${product.partner ? `
                <p class="text-sm text-gray-500 mb-2">by ${product.partner}</p>
              ` : ''}
              
              ${product.discount > 0 ? `
                <div class="inline-flex items-center gap-2 bg-brand-50 px-3 py-1 rounded-full mb-4">
                  <span class="text-brand-600 font-bold text-sm">${product.discount}% OFF</span>
                </div>
              ` : ''}
              
              <div class="flex items-baseline gap-3 mb-6">
                <span class="text-4xl font-bold text-gray-900">${formatPrice(salePrice)}</span>
                ${product.discount > 0 ? `<span class="text-xl text-gray-400 line-through">${formatPrice(product.price)}</span>` : ''}
              </div>
            </div>
            
            <div class="mb-6">
              <h3 class="text-sm font-bold text-gray-900 mb-2">Product Details</h3>
              <p class="text-gray-600">${product.description || `High-quality ${product.category} product from Mindanao. Contact seller for detailed specifications and availability.`}</p>
            </div>
            
            <div class="mt-auto flex gap-3">
              <button onclick="window.addToCartFromModal(${product.id})" class="btn-primary flex-1">
                <svg class="w-5 h-5 mr-2 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path>
                </svg>
                Add to Cart
              </button>
              <a href="/product.html?id=${product.id}" class="btn-outline flex-1 text-center">
                Full Details
              </a>
            </div>
          </div>
        </div>
      `;

      modal.classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    };

    document.getElementById('close-modal').addEventListener('click', closeModal);
    document.getElementById('modal-backdrop').addEventListener('click', closeModal);

    function closeModal() {
      modal.classList.add('hidden');
      document.body.style.overflow = 'auto';
    }

    // Add to cart functions
    window.addToCartFromShop = (productId) => {
      addToCart(productId);
    };

    window.addToCartFromModal = (productId) => {
      addToCart(productId);
      closeModal();
    };

    function addToCart(productId) {
      const product = allProducts.find(p => p.id == productId);
      if (!product) return;

      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      const existingItem = cart.find(item => item.id == productId);

      if (existingItem) {
        existingItem.quantity += 1;
        showToast(`${product.name} quantity updated!`, 'success');
      } else {
        cart.push({
          id: product.id,
          name: product.name,
          price: product.price,
          discount_percentage: product.discount || 0,
          quantity: 1,
          stock_quantity: 999, // Default stock for shop page
          company: product.partner,
          images: [product.image]
        });
        showToast(`${product.name} added to cart!`, 'success');
      }

      localStorage.setItem('cart', JSON.stringify(cart));
      window.dispatchEvent(new Event('cart-updated'));
    }

    loadProducts();
  </script>
</body>
</html>
