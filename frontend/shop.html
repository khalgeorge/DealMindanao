<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop Deals - DealMindanao</title>
  <link rel="stylesheet" href="/src/css/app.css">
</head>
<body class="bg-gray-50">
  <div id="navbar"></div>

  <main class="page-shell py-8">
    <div class="mb-8">
      <h1 class="text-3xl font-bold text-gray-900">Discover Best Deals</h1>
      <p class="text-gray-600 mt-2">Authentic Mindanao products at unbeatable prices.</p>
    </div>

    <div class="flex flex-col lg:flex-row gap-8">
      <!-- Sidebar Filters: Desktop -->
      <aside class="w-full lg:w-64 space-y-8 flex-shrink-0">
        <!-- Search -->
        <div>
          <label class="block mb-2 font-bold uppercase tracking-tight text-xs text-gray-500">Search</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
              </svg>
            </span>
            <input type="text" id="search-input" class="input pl-10 h-11" placeholder="Search keywords...">
          </div>
        </div>

        <!-- Category -->
        <div>
          <label class="block mb-3 font-bold uppercase tracking-tight text-xs text-gray-500">Category</label>
          <div id="category-filters" class="space-y-2">
            <label class="flex items-center group cursor-pointer">
              <input type="checkbox" value="electronics" class="w-4 h-4 text-brand-600 rounded border-gray-300 focus:ring-brand-500">
              <span class="ml-3 text-sm text-gray-700 group-hover:text-brand-600">Electronics</span>
            </label>
            <label class="flex items-center group cursor-pointer">
              <input type="checkbox" value="fashion" class="w-4 h-4 text-brand-600 rounded border-gray-300 focus:ring-brand-500">
              <span class="ml-3 text-sm text-gray-700 group-hover:text-brand-600">Fashion</span>
            </label>
            <label class="flex items-center group cursor-pointer">
              <input type="checkbox" value="food" class="w-4 h-4 text-brand-600 rounded border-gray-300 focus:ring-brand-500">
              <span class="ml-3 text-sm text-gray-700 group-hover:text-brand-600">Food & Drinks</span>
            </label>
            <label class="flex items-center group cursor-pointer">
              <input type="checkbox" value="crafts" class="w-4 h-4 text-brand-600 rounded border-gray-300 focus:ring-brand-500">
              <span class="ml-3 text-sm text-gray-700 group-hover:text-brand-600">Native Crafts</span>
            </label>
          </div>
        </div>

        <!-- Sorting -->
        <div>
          <label class="block mb-2 font-bold uppercase tracking-tight text-xs text-gray-500">Sort By</label>
          <select id="sort-select" class="input h-11">
            <option value="newest">Newest First</option>
            <option value="price-low">Price: Low to High</option>
            <option value="price-high">Price: High to Low</option>
            <option value="popular">Most Popular</option>
          </select>
        </div>
      </aside>

      <!-- Results Grid -->
      <div class="flex-1">
        <!-- Grid Header -->
        <div class="flex items-center justify-between mb-6">
          <p class="text-sm text-gray-500"><span id="result-count" class="font-bold text-gray-900">0</span> products found</p>
        </div>

        <!-- Skeleton Loading (Hidden by default) -->
        <div id="loading-skeleton" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
          <div class="animate-pulse">
            <div class="bg-gray-200 aspect-[4/5] rounded-lg mb-4"></div>
            <div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div>
            <div class="h-6 bg-gray-200 rounded w-1/4"></div>
          </div>
          <div class="animate-pulse">
            <div class="bg-gray-200 aspect-[4/5] rounded-lg mb-4"></div>
            <div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div>
            <div class="h-6 bg-gray-200 rounded w-1/4"></div>
          </div>
          <div class="animate-pulse">
            <div class="bg-gray-200 aspect-[4/5] rounded-lg mb-4"></div>
            <div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div>
            <div class="h-6 bg-gray-200 rounded w-1/4"></div>
          </div>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden text-center py-20 card border-dashed border-2">
          <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
          </div>
          <h2 class="text-xl font-bold text-gray-900 mb-2">No deals found</h2>
          <p class="text-gray-500 mb-8">Try adjusting your filters or search keywords.</p>
          <button id="clear-filters" class="btn-primary">Clear All Filters</button>
        </div>

        <!-- Products Grid -->
        <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
          <!-- Dynamic products injected here -->
        </div>
      </div>
    </div>
  </main>

  <div id="footer"></div>

  <script type="module" src="/src/js/layout.js"></script>
  <script type="module">
    import { formatPrice, showToast } from '/src/js/utils.js';
    import api from '/src/js/api.js';

    let allProducts = [];
    const grid = document.getElementById('products-grid');
    const skeleton = document.getElementById('loading-skeleton');
    const emptyState = document.getElementById('empty-state');
    const countLabel = document.getElementById('result-count');

    async function loadProducts() {
      grid.innerHTML = '';
      skeleton.classList.remove('hidden');
      emptyState.classList.add('hidden');

      try {
        let products = [];
        try {
          const response = await api.get('/products');
          products = response.data.data || response.data || [];
        } catch (e) {
          console.warn('Using demo data');
          products = [
            { id: 1, name: "Bukidnon Highlands Arabica", partner: "Mt. Kitanglad Farms", price: 850, discount: 15, category: "food", image: "https://images.unsplash.com/photo-1559056199-641a0ac8b55e?q=80&w=400" },
            { id: 2, name: "Handwoven T'nalak Wallet", partner: "Lake Sebu Weavers", price: 1200, discount: 0, category: "fashion", image: "https://images.unsplash.com/photo-1583258292688-d0213dc5a3a8?q=80&w=400" },
            { id: 3, name: "Artisan Wood Carving", partner: "Paete Mindanao", price: 4500, discount: 20, category: "crafts", image: "https://images.unsplash.com/photo-1571217333550-93836d934661?q=80&w=400" },
            { id: 4, name: "Davao Dark Chocolate 70%", partner: "Malagos Garden", price: 350, discount: 10, category: "food", image: "https://images.unsplash.com/photo-1548907040-4baa42d10919?q=80&w=400" },
            { id: 5, name: "Native Pearl Earrings", partner: "Tawi-Tawi Gems", price: 15000, discount: 5, category: "fashion", image: "https://images.unsplash.com/photo-1599643477877-537ef5278533?q=80&w=400" },
            { id: 6, name: "Abaca Fiber Laptop Sleeve", partner: "Bicol-Mindanao Fiber", price: 950, discount: 0, category: "electronics", image: "https://images.unsplash.com/photo-1591561954557-26941169b49e?q=80&w=400" },
            { id: 7, name: "Zamboanga Sardines Gift Pack", partner: "Mega Global", price: 580, discount: 25, category: "food", image: "https://images.unsplash.com/photo-1599307772551-0730d07db0a0?q=80&w=400" },
            { id: 8, name: "Maranao Brass Gong", partner: "Lanao Arts", price: 8500, discount: 12, category: "crafts", image: "https://images.unsplash.com/photo-1580915411954-282cb1b0d780?q=80&w=400" }
          ];
        }

        allProducts = products;
        renderProducts(allProducts);
      } catch (error) {
        showToast('Failed to load deals', 'error');
      } finally {
        skeleton.classList.add('hidden');
      }
    }

    function renderProducts(products) {
      countLabel.textContent = products.length;
      
      if (products.length === 0) {
        grid.innerHTML = '';
        emptyState.classList.remove('hidden');
        return;
      }

      emptyState.classList.add('hidden');
      grid.innerHTML = products.map(product => {
        const salePrice = product.discount > 0 ? product.price * (1 - product.discount / 100) : product.price;
        
        return `
          <div class="product-card group flex flex-col h-full bg-white animate-fade-in shadow-sm hover:shadow-xl transition-all duration-300 rounded-lg">
            <a href="/product.html?id=${product.id}" class="block overflow-hidden relative aspect-[4/5] bg-gray-100 rounded-t-lg">
              <img src="${product.image || 'https://via.placeholder.com/400'}" alt="${product.name}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
              
              ${product.discount > 0 ? `
                <div class="absolute top-3 left-3 bg-brand-600 text-white text-[10px] font-bold px-2 py-1 rounded-lg shadow-sm">
                  ${product.discount}% OFF
                </div>
              ` : ''}

              <div class="absolute inset-0 bg-black/0 group-hover:bg-black/5 transition-colors duration-300"></div>
            </a>
            
            <div class="p-4 flex-1 flex flex-col justify-between">
              <div>
                <p class="text-[10px] font-bold text-brand-600 uppercase tracking-widest mb-1 truncate">${product.partner || 'Mindanao Artisan'}</p>
                <h3 class="text-sm font-semibold text-gray-900 mb-2 line-clamp-2">${product.name}</h3>
              </div>
              
              <div class="mt-4 flex flex-col gap-3">
                <div class="flex items-center gap-2">
                  <span class="text-lg font-bold text-gray-900">${formatPrice(salePrice)}</span>
                  ${product.discount > 0 ? `<span class="text-xs text-gray-400 line-through">${formatPrice(product.price)}</span>` : ''}
                </div>
                <button class="btn-primary w-full btn-sm">View Deal</button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    // Interactive Filtering
    const searchInput = document.getElementById('search-input');
    searchInput.addEventListener('input', applyFilters);

    document.querySelectorAll('#category-filters input').forEach(cb => {
      cb.addEventListener('change', applyFilters);
    });

    document.getElementById('sort-select').addEventListener('change', applyFilters);

    function applyFilters() {
      const query = searchInput.value.toLowerCase();
      const selectedCategories = Array.from(document.querySelectorAll('#category-filters input:checked')).map(cb => cb.value);
      const sortValue = document.getElementById('sort-select').value;

      let filtered = allProducts.filter(p => {
        const matchesSearch = p.name.toLowerCase().includes(query) || (p.partner && p.partner.toLowerCase().includes(query));
        const matchesCategory = selectedCategories.length === 0 || selectedCategories.includes(p.category);
        return matchesSearch && matchesCategory;
      });

      // Sorting
      if (sortValue === 'price-low') filtered.sort((a,b) => (a.price*(1-(a.discount/100))) - (b.price*(1-(b.discount/100))));
      if (sortValue === 'price-high') filtered.sort((a,b) => (b.price*(1-(b.discount/100))) - (a.price*(1-(a.discount/100))));

      renderProducts(filtered);
    }

    document.getElementById('clear-filters').addEventListener('click', () => {
      searchInput.value = '';
      document.querySelectorAll('#category-filters input').forEach(cb => cb.checked = false);
      renderProducts(allProducts);
    });

    loadProducts();
  </script>
</body>
</html>

          </nav>
        </div>
      </div>
    </div>
  </main>

  <script type="module">
    import { createNavbar, initNavbar } from '/src/js/components/navbar.js';
    import { createFooter } from '/src/js/components/footer.js';
    import { formatPrice, showToast } from '/src/js/utils.js';
    import api from '/src/js/api.js';

    // Render components
    document.getElementById('navbar').innerHTML = createNavbar();
    document.getElementById('footer').innerHTML = createFooter();
    initNavbar();

    // State
    let products = [];
    let filteredProducts = [];
    let currentPage = 1;
    const perPage = 12;

    // Demo Data Fallback
    const demoProducts = [
      {
        id: '1',
        name: 'Davao Durian Coffee (Special Blend)',
        price: 450.00,
        discount_percentage: 10,

      {

        category_id: 'crafts',
        average_rating: 4.9,
        reviews_count: 56,
        stock: 12,

      },
      {
        id: '3',
        name: 'Mindanao Brass Kettle (Heirloom quality)',
        price: 3500.00,
        discount_percentage: 15,
        image_url: 'https://images.unsplash.com/photo-1580915411954-282cb1b0d780?auto=format&fit=crop&q=80&w=400',
        category_id: 'crafts',
        average_rating: 4.7,
        reviews_count: 18,
        stock: 5,
        created_at: '2024-01-03'
      },
      {
        id: '4',
        name: 'Premium Camiguin Lanzones (Fresh, 5kg)',
        price: 850.00,
        discount_percentage: 5,
        image_url: 'https://images.unsplash.com/photo-1610832958506-aa56368176cf?auto=format&fit=crop&q=80&w=400',
        category_id: 'food',
        average_rating: 4.6,
        reviews_count: 89,
        stock: 30,
        created_at: '2024-01-04'
      },
      {
        id: '5',
        name: 'Zamboanga Pearl Necklace (Genuine)',
        price: 2800.00,
        discount_percentage: 20,
        image_url: 'https://images.unsplash.com/photo-1535633302704-b02f5421c0ad?auto=format&fit=crop&q=80&w=400',
        category_id: 'fashion',
        average_rating: 5.0,
        reviews_count: 42,
        stock: 8,
        created_at: '2024-01-05'
      },
      {
        id: '6',
        name: 'Bukidnon Pure Wild Honey (750ml)',
        price: 550.00,
        discount_percentage: 0,
        image_url: 'https://images.unsplash.com/photo-1587049352846-4a222e784d38?auto=format&fit=crop&q=80&w=400',
        category_id: 'food',
        average_rating: 4.8,
        reviews_count: 215,
        stock: 100,
        created_at: '2024-01-06'
      },
      {
        id: '7',
        name: 'Maranao Inaul Scarf (Traditional Purple)',
        price: 750.00,
        discount_percentage: 10,
        image_url: 'https://images.unsplash.com/photo-1456318019777-ccdc4d812336?auto=format&fit=crop&q=80&w=400',
        category_id: 'fashion',
        average_rating: 4.7,
        reviews_count: 67,
        stock: 25,
        created_at: '2024-01-07'
      },
      {
        id: '8',
        name: 'Davao Malagos Dark Chocolate Set',
        price: 1200.00,
        discount_percentage: 0,
        image_url: 'https://images.unsplash.com/photo-1548907040-4baa42d10919?auto=format&fit=crop&q=80&w=400',
        category_id: 'food',
        average_rating: 4.9,
        reviews_count: 312,
        stock: 45,
        created_at: '2024-01-08'
      }
    ];

    // Fetch products
    async function fetchProducts() {
      const loading = document.getElementById('loading');
      const productsGrid = document.getElementById('products-grid');
      const emptyState = document.getElementById('empty-state');
      
      loading.classList.remove('hidden');
      productsGrid.innerHTML = '';
      emptyState.classList.add('hidden');

      try {
        const response = await api.get('/products');
        products = response.data.data || response.data;
        if (!products || !products.length) throw new Error('No products found');
      } catch (error) {
        console.warn('API Failed, using demo data:', error);
        products = demoProducts;
      } finally {
        filteredProducts = products;
        renderProducts();
        loading.classList.add('hidden');
      }
    }

    // Render products
    function renderProducts() {
      const productsGrid = document.getElementById('products-grid');
      const emptyState = document.getElementById('empty-state');
      const productCount = document.getElementById('product-count');
      
      productCount.textContent = filteredProducts.length;

      if (filteredProducts.length === 0) {
        productsGrid.innerHTML = '';
        emptyState.classList.remove('hidden');
        return;
      }

      emptyState.classList.add('hidden');
      
      const start = (currentPage - 1) * perPage;
      const end = start + perPage;
      const paginatedProducts = filteredProducts.slice(start, end);

      productsGrid.innerHTML = paginatedProducts.map(product => {
        const hasDiscount = product.discount_percentage > 0;
        const originalPrice = parseFloat(product.price);
        const salePrice = hasDiscount ? originalPrice * (1 - product.discount_percentage / 100) : originalPrice;
        const rating = product.average_rating || 4.5;
        const ratingStars = '★'.repeat(Math.floor(rating)) + '☆'.repeat(5 - Math.floor(rating));

        return `
          <div class="product-card">
            <a href="/product.html?id=${product.id}" class="block">
              <div class="aspect-square overflow-hidden bg-gray-100 relative">
                ${hasDiscount ? `<div class="absolute top-2 right-2 z-10 discount-badge">${product.discount_percentage}% OFF</div>` : ''}
                <img src="${product.image_url || 'https://via.placeholder.com/300'}" alt="${product.name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
              </div>
              <div class="p-4">
                <h3 class="font-medium text-gray-900 mb-1 line-clamp-2 group-hover:text-brand-600">${product.name}</h3>
                <div class="flex items-center space-x-1 mb-2">
                  <span class="text-yellow-400 text-sm">${ratingStars}</span>
                  <span class="text-xs text-gray-500">(${product.reviews_count || 0})</span>
                </div>
                <div class="flex items-center space-x-2">
                  ${hasDiscount ? `
                    <span class="price-accent">${formatPrice(salePrice)}</span>
                    <span class="price-original">${formatPrice(originalPrice)}</span>
                  ` : `
                    <span class="price-sale">${formatPrice(originalPrice)}</span>
                  `}
                </div>
                ${product.stock < 10 && product.stock > 0 ? `<p class="text-xs text-red-600 mt-1">Only ${product.stock} left!</p>` : ''}
                ${product.stock === 0 ? `<p class="text-xs text-red-600 mt-1">Out of stock</p>` : ''}
              </div>
            </a>
          </div>
        `;
      }).join('');

      renderPagination();
    }

    // Render pagination
    function renderPagination() {
      const totalPages = Math.ceil(filteredProducts.length / perPage);
      const prevBtn = document.getElementById('prev-page');
      const nextBtn = document.getElementById('next-page');
      const pageNumbers = document.getElementById('page-numbers');

      prevBtn.disabled = currentPage === 1;
      nextBtn.disabled = currentPage === totalPages;

      pageNumbers.innerHTML = Array.from({ length: totalPages }, (_, i) => i + 1).map(page => `
        <button class="px-3 py-1 text-sm rounded-lg ${page === currentPage ? 'bg-brand-600 text-white' : 'text-gray-700 hover:bg-gray-100'}" data-page="${page}">${page}</button>
      `).join('');

      pageNumbers.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          currentPage = parseInt(btn.dataset.page);
          renderProducts();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      });
    }

    // Apply filters
    function applyFilters() {
      const search = document.getElementById('search').value.toLowerCase();
      const category = document.getElementById('category').value;
      const minPrice = parseFloat(document.getElementById('minPrice').value) || 0;
      const maxPrice = parseFloat(document.getElementById('maxPrice').value) || Infinity;
      const minRating = document.querySelector('input[name="rating"]:checked')?.value || 0;

      filteredProducts = products.filter(product => {
        const matchesSearch = product.name.toLowerCase().includes(search) || 
                            (product.description && product.description.toLowerCase().includes(search));
        const matchesCategory = !category || product.category_id === category;
        const price = parseFloat(product.price);
        const matchesPrice = price >= minPrice && price <= maxPrice;
        const matchesRating = (product.average_rating || 0) >= minRating;

        return matchesSearch && matchesCategory && matchesPrice && matchesRating;
      });

      currentPage = 1;
      renderProducts();
    }

    // Sort products
    function sortProducts(sortBy) {
      switch (sortBy) {
        case 'price-asc':
          filteredProducts.sort((a, b) => parseFloat(a.price) - parseFloat(b.price));
          break;
        case 'price-desc':
          filteredProducts.sort((a, b) => parseFloat(b.price) - parseFloat(a.price));
          break;
        case 'rating':
          filteredProducts.sort((a, b) => (b.average_rating || 0) - (a.average_rating || 0));
          break;
        case 'newest':
          filteredProducts.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
          break;
      }
      renderProducts();
    }

    // Event listeners
    document.getElementById('apply-filters').addEventListener('click', applyFilters);
    document.getElementById('reset-filters').addEventListener('click', () => {
      document.getElementById('search').value = '';
      document.getElementById('category').value = '';
      document.getElementById('minPrice').value = '';
      document.getElementById('maxPrice').value = '';
      document.querySelectorAll('input[name="rating"]').forEach(input => input.checked = false);
      filteredProducts = products;
      currentPage = 1;
      renderProducts();
    });

    document.getElementById('search').addEventListener('input', applyFilters);
    document.getElementById('sort').addEventListener('change', (e) => sortProducts(e.target.value));

    document.getElementById('prev-page').addEventListener('click', () => {
      if (currentPage > 1) {
        currentPage--;
        renderProducts();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });

    document.getElementById('next-page').addEventListener('click', () => {
      const totalPages = Math.ceil(filteredProducts.length / perPage);
      if (currentPage < totalPages) {
        currentPage++;
        renderProducts();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });

    // Initialize
    fetchProducts();
  </script>
</body>
</html>
