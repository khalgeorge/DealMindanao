<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join DealMindanao</title>
  <link rel="stylesheet" href="/src/css/app.css">
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="navbar"></div>

  <main class="py-32">
     <div class="container mx-auto px-6">
        <div class="max-w-4xl mx-auto bg-white rounded-lg shadow-2xl shadow-brand-100 overflow-hidden flex flex-col md:flex-row-reverse border border-gray-100">
           <!-- Side Decor -->
           <div class="md:w-1/2 bg-gray-900 p-12 text-white flex flex-col justify-between relative overflow-hidden">
              <div class="absolute -bottom-10 -right-10 w-40 h-40 bg-brand-600 rounded-full blur-2xl opacity-50"></div>
              <div class="relative z-10">
                 <h2 class="text-3xl font-black italic tracking-tighter">DEALMINDANAO</h2>
                 <p class="mt-6 text-gray-400 font-medium leading-relaxed italic">"Bringing Mindanao's quality to the center stage."</p>
              </div>
              
              <div class="bg-white/5 p-6 rounded-lg backdrop-blur-sm border border-white/10 relative z-10">
                 <p class="text-xs font-bold uppercase tracking-widest text-brand-400 mb-2">Benefit #1</p>
                 <h4 class="font-black text-lg">Exclusive Early Access</h4>
                 <p class="text-sm text-gray-400 mt-2">Be the first to know about limited handicrafts and seasonal harvests.</p>
              </div>
           </div>

           <!-- Form -->
           <div class="md:w-1/2 p-12 lg:p-16 bg-white">
              <h1 class="text-3xl font-black text-gray-900 mb-2">Create Account</h1>
              <p class="text-gray-400 font-bold uppercase tracking-widest text-[10px] mb-8">Join our thriving community</p>

              <form class="space-y-4">
                 <div class="grid grid-cols-2 gap-4">
                    <div>
                       <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">First Name</label>
                       <input type="text" class="input w-full py-3 rounded-lg" placeholder="Juan" required>
                    </div>
                    <div>
                       <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Last Name</label>
                       <input type="text" class="input w-full py-3 rounded-lg" placeholder="Dela Cruz" required>
                    </div>
                 </div>
                 <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Email Address</label>
                    <input type="email" class="input w-full py-3 rounded-lg" placeholder="juan@delacruz.ph" required>
                 </div>
                 <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Create Password</label>
                    <input type="password" class="input w-full py-3 rounded-lg" placeholder="••••••••" required>
                 </div>

                 <div class="pt-4">
                    <button type="submit" class="btn-primary w-full py-4 rounded-lg font-black uppercase tracking-widest shadow-lg shadow-brand-100">
                       Start Exploring
                    </button>
                 </div>

                 <div class="pt-6 text-center">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Already a member? <a href="/login.html" class="text-brand-600 hover:underline">Log in</a></p>
                 </div>
              </form>
           </div>
        </div>
     </div>
  </main>

  <div id="footer"></div>
  <script type="module" src="/src/js/layout.js"></script>
</body>
</html>
