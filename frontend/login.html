<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - DealMindanao</title>
  <link rel="stylesheet" href="/src/css/app.css">
</head>
<body class="bg-gray-50 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-white via-gray-50 to-gray-100 min-h-screen">
  <div id="navbar"></div>

  <main class="py-32">
     <div class="container mx-auto px-6">
        <div class="max-w-4xl mx-auto bg-white rounded-lg shadow-2xl shadow-brand-100 overflow-hidden flex flex-col md:flex-row border border-gray-100">
           <!-- Side Decor -->
           <div class="md:w-1/2 bg-brand-600 p-12 text-white flex flex-col justify-between relative overflow-hidden">
              <div class="absolute -top-10 -left-10 w-40 h-40 bg-white/10 rounded-full blur-2xl"></div>
              <div class="relative z-10">
                 <h2 class="text-3xl font-black italic tracking-tighter">DEALMINDANAO</h2>
                 <p class="mt-6 text-brand-100 font-medium leading-relaxed">Access the best local products and exclusive regional deals.</p>
              </div>
              
              <div class="space-y-6 relative z-10">
                 <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-white/10 rounded-lg flex items-center justify-center"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg></div>
                    <span class="text-sm font-bold uppercase tracking-widest">Global Shipping</span>
                 </div>
                 <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-white/10 rounded-lg flex items-center justify-center"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg></div>
                    <span class="text-sm font-bold uppercase tracking-widest">Local Artisans</span>
                 </div>
              </div>
           </div>

           <!-- Form -->
           <div class="md:w-1/2 p-12 lg:p-16 bg-white">
              <h1 class="text-3xl font-black text-gray-900 mb-2">Welcome Back</h1>
              <p class="text-gray-400 font-bold uppercase tracking-widest text-[10px] mb-8">Sign in to your account</p>

              <form id="login-form" class="space-y-6">
                 <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Email Address</label>
                    <input type="email" name="email" class="input w-full py-4 rounded-lg" placeholder="you@example.com" required>
                 </div>
                 <div>
                    <div class="flex justify-between items-center mb-2">
                       <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest">Password</label>
                       <a href="#" class="text-[10px] font-bold text-brand-600 uppercase tracking-widest hover:underline">Forgot?</a>
                    </div>
                    <input type="password" name="password" class="input w-full py-4 rounded-lg" placeholder="••••••••" required>
                 </div>

                 <button type="submit" class="btn-primary w-full py-5 rounded-lg font-black uppercase tracking-widest shadow-lg shadow-brand-100 mt-4">
                    Sign In
                 </button>

                 <div class="pt-8 text-center">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">New here? <a href="/register.html" class="text-brand-600 hover:underline">Create an account</a></p>
                 </div>
              </form>
           </div>
        </div>
     </div>
  </main>

  <div id="footer"></div>
  <script type="module" src="/src/js/layout.js"></script>
  <script type="module">
    import { auth } from '/src/js/api.js';
    import { showToast } from '/src/js/utils.js';

    // Redirect if already logged in
    if (auth.isAuthenticated()) {
      window.location.href = '/index.html';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const formData = new FormData(e.target);
      const data = {
        email: formData.get('email'),
        password: formData.get('password')
      };

      const submitBtn = e.target.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in...';

      try {
        await auth.login(data.email, data.password);
        showToast('Welcome back!', 'success');
        
        // Check for redirect
        const redirect = localStorage.getItem('redirect_after_login');
        localStorage.removeItem('redirect_after_login');
        
        setTimeout(() => {
          window.location.href = redirect || '/index.html';
        }, 1000);
      } catch (error) {
        console.error('Login error:', error);
        const errorMessage = error.response?.data?.message || 'Invalid email or password';
        showToast(errorMessage, 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
