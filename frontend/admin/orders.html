<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;">
  <title>Orders - DealMindanao Admin</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/src/css/app.css">
</head>
<body class="admin-layout">
  <div id="sidebar"></div>

  <main class="admin-main">
    <header class="admin-header">
      <div>
        <h1 class="text-xl font-black text-gray-900">Orders</h1>
        <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mt-1">Process and Manage Transactions</p>
      </div>
      <div class="flex items-center gap-4">
        <button onclick="exportCSV()" class="btn-secondary btn-sm flex items-center gap-2">
           <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
           Export CSV
        </button>
      </div>
    </header>

    <!-- Environment Banner (populated by JS after auth) -->
    <div id="env-banner" class="hidden px-8 pt-4"></div>

    <div class="admin-content">
      <!-- Search & Filters -->
      <div class="mb-8 flex flex-col md:flex-row gap-4 items-center justify-between">
         <div class="relative w-full md:w-96">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
               <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </span>
            <input type="text" id="order-search" placeholder="Search Order ID or Customer name..." class="input pl-11">
         </div>
         <div class="flex gap-2">
            <select id="sort-order" class="input py-2 text-xs font-bold uppercase tracking-wider w-40">
               <option value="newest">Newest First</option>
               <option value="oldest">Oldest First</option>
               <option value="highest">Highest Amount</option>
            </select>
            <button onclick="resetFilters()" class="btn-secondary px-4 py-2 text-[10px] font-black uppercase tracking-widest flex items-center gap-2 whitespace-nowrap">
               <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
               Reset
            </button>
         </div>
      </div>

      <!-- Tabs for status -->
      <div class="mb-8 border-b border-gray-200">
         <nav class="flex gap-8">
            <button onclick="filterStatus('All')" class="order-tab active pb-4 px-1 border-b-2 font-bold text-sm transition-all">All Orders</button>
            <button onclick="filterStatus('Pending')" class="order-tab pb-4 px-1 border-b-2 border-transparent font-bold text-sm text-gray-400 hover:text-gray-600 transition-all">Pending</button>
            <button onclick="filterStatus('Shipped')" class="order-tab pb-4 px-1 border-b-2 border-transparent font-bold text-sm text-gray-400 hover:text-gray-600 transition-all">Shipped</button>
            <button onclick="filterStatus('Cancelled')" class="order-tab pb-4 px-1 border-b-2 border-transparent font-bold text-sm text-gray-400 hover:text-gray-600 transition-all">Cancelled</button>
         </nav>
      </div>

      <!-- Orders Table -->
      <div class="bg-white rounded-lg border border-gray-100 shadow-sm overflow-hidden">
         <div class="overflow-x-auto">
            <table class="data-table">
               <thead>
                  <tr>
                     <th class="px-6 py-4 text-[10px] font-black text-gray-400 uppercase tracking-widest">Order ID</th>
                     <th class="px-6 py-4 text-[10px] font-black text-gray-400 uppercase tracking-widest">Customer</th>
                     <th class="px-6 py-4 text-[10px] font-black text-gray-400 uppercase tracking-widest">Date</th>
                     <th class="px-6 py-4 text-[10px] font-black text-gray-400 uppercase tracking-widest">Total</th>
                     <th class="px-6 py-4 text-[10px] font-black text-gray-400 uppercase tracking-widest">Method</th>
                     <th class="px-6 py-4 text-[10px] font-black text-gray-400 uppercase tracking-widest">Status</th>
                     <th class="px-6 py-4 text-right text-[10px] font-black text-gray-400 uppercase tracking-widest">Actions</th>
                  </tr>
               </thead>
               <tbody id="order-list-body">
                  <!-- Rows injected by script -->
               </tbody>
            </table>
         </div>

         <!-- Pagination -->
         <div class="p-6 border-t border-gray-50 flex items-center justify-between">
            <div class="flex items-center gap-4">
               <span id="pagination-info" class="text-xs font-bold text-gray-400 uppercase tracking-widest">Showing 0-0 of 0 orders</span>
               <div class="h-4 w-px bg-gray-200"></div>
               <div class="flex items-center gap-2">
                  <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Rows:</span>
                  <select id="rows-per-page" class="bg-transparent border-none text-xs font-black text-gray-900 focus:ring-0 cursor-pointer">
                     <option value="5">5</option>
                     <option value="10">10</option>
                     <option value="20">20</option>
                     <option value="50">50</option>
                  </select>
               </div>
            </div>
            <div class="flex gap-2">
               <button id="prev-page" class="btn-secondary btn-sm">Previous</button>
               <button id="next-page" class="btn-secondary btn-sm">Next</button>
            </div>
         </div>
      </div>
    </div>
  </main>

  <!-- Order Details Modal -->
  <div id="order-modal" class="fixed inset-0 z-[999] hidden" role="dialog" aria-modal="true">
     <div class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm transition-opacity" onclick="closeOrderModal()"></div>
     
     <div class="fixed inset-0 pointer-events-none flex items-center justify-center p-4">
        <div class="pointer-events-auto bg-white w-full max-w-2xl rounded-xl shadow-2xl overflow-hidden transform transition-all flex flex-col max-h-[90vh] border border-gray-200">
           
           <!-- Header -->
           <div class="relative bg-gray-50 border-b border-gray-100 p-8 flex-shrink-0">
              <div class="flex justify-between items-start">
                 <div>
                    <h2 id="modal-order-id" class="text-2xl font-black text-gray-900 uppercase tracking-tighter mb-1">Order Details</h2>
                    <div class="flex items-center gap-3">
                       <span id="modal-order-date" class="text-[10px] font-black text-gray-400 uppercase tracking-widest leading-none">Feb 12, 2026</span>
                       <div id="modal-order-status" class="px-2.5 py-1 rounded-full text-[9px] font-black uppercase tracking-widest border">
                          Pending
                       </div>
                    </div>
                 </div>
                 <button onclick="closeOrderModal()" class="p-2 text-gray-400 hover:text-gray-900 transition-all">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                 </button>
              </div>
           </div>

           <!-- Content -->
           <div class="px-8 py-10 overflow-y-auto custom-scrollbar space-y-10">
              
              <div class="grid grid-cols-2 gap-10">
                 <section>
                    <h3 class="text-[11px] font-black text-gray-900 uppercase tracking-widest mb-4 flex items-center gap-2">
                       <span class="w-1 h-4 bg-brand-600 rounded-full"></span>
                       Customer Information
                    </h3>
                    <div class="p-6 rounded-xl bg-gray-50 border border-gray-100 space-y-4">
                       <div>
                          <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest leading-none mb-1">Name</p>
                          <p id="modal-customer-name" class="text-sm font-black text-gray-900">Juan Dela Cruz</p>
                       </div>
                       <div>
                          <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest leading-none mb-1">Payment Method</p>
                          <p id="modal-payment-method" class="text-sm font-black text-gray-900">GCash</p>
                       </div>
                    </div>
                 </section>

                 <section>
                    <h3 class="text-[11px] font-black text-gray-900 uppercase tracking-widest mb-4 flex items-center gap-2">
                       <span class="w-1 h-4 bg-brand-600 rounded-full"></span>
                       Management
                    </h3>
                    <div class="p-6 rounded-xl bg-gray-50 border border-gray-100 space-y-4">
                       <div>
                          <label class="block text-[9px] font-black text-gray-400 uppercase tracking-widest leading-none mb-2">Update Status</label>
                          <select id="modal-update-status" class="w-full px-4 py-2.5 bg-white border border-gray-200 rounded-lg focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all outline-none text-gray-900 text-xs font-bold appearance-none">
                             <option value="Pending">Pending Review</option>
                             <option value="Shipped">Mark as Shipped</option>
                             <option value="Cancelled">Cancel Order</option>
                          </select>
                       </div>
                       <button onclick="updateOrderStatus()" class="w-full py-2.5 bg-brand-600 text-white rounded-lg font-black text-[10px] uppercase tracking-widest shadow-lg shadow-brand-100 hover:bg-brand-700 transition-all">
                          Save Changes
                       </button>
                    </div>
                 </section>
              </div>

              <section>
                 <h3 class="text-[11px] font-black text-gray-900 uppercase tracking-widest mb-4 flex items-center gap-2">
                    <span class="w-1 h-4 bg-brand-600 rounded-full"></span>
                    Order Items
                 </h3>
                 <div class="rounded-xl border border-gray-100 overflow-hidden">
                    <table class="w-full text-left bg-white">
                       <thead class="bg-gray-50 border-b border-gray-100">
                          <tr>
                             <th class="px-6 py-3 text-[9px] font-black text-gray-400 uppercase tracking-widest">Item</th>
                             <th class="px-6 py-3 text-[9px] font-black text-gray-400 uppercase tracking-widest">Price</th>
                             <th class="px-6 py-3 text-[9px] font-black text-gray-400 uppercase tracking-widest">Qty</th>
                             <th class="px-6 py-3 text-right text-[9px] font-black text-gray-400 uppercase tracking-widest">Subtotal</th>
                          </tr>
                       </thead>
                       <tbody id="modal-order-items">
                          <!-- Mock items -->
                       </tbody>
                       <tfoot class="bg-gray-50 border-t border-gray-100 font-black">
                          <tr>
                             <td colspan="3" class="px-6 py-4 text-right text-[10px] uppercase tracking-widest">Total Amount</td>
                             <td id="modal-total-amount" class="px-6 py-4 text-right text-sm text-gray-900">₱0.00</td>
                          </tr>
                       </tfoot>
                    </table>
                 </div>
              </section>

           </div>

           <!-- Footer -->
           <div class="p-8 bg-gray-50 border-t border-gray-100 flex gap-4 flex-shrink-0">
              <button onclick="closeOrderModal()" class="px-8 py-4 bg-white text-gray-600 rounded-lg font-black text-[10px] uppercase tracking-widest hover:bg-gray-100 border border-gray-200 transition-all flex-1">
                 Close
              </button>
              <button onclick="printInvoice()" class="flex-[2] py-4 px-8 bg-brand-600 text-white rounded-lg font-black text-[10px] uppercase tracking-widest shadow-lg shadow-brand-100 hover:bg-brand-700 transition-all">
                 Print Invoice
              </button>
           </div>
        </div>
     </div>
  </div>

  <style>
     .order-tab.active {
        border-color: #f7941d; /* brand-600 */
        color: #f7941d;
     }
  </style>

  <script type="module" src="/src/js/layout.js"></script>
  <script type="module">
    import { formatPrice, showToast, initEnvBanner } from '/src/js/utils.js';
    import { orders as ordersAPI } from '/src/js/api.js';

    let allOrders = [];
    let currentStatus = 'all';
    let searchQuery = '';
    let sortOption = 'newest';
    let currentPage = 1;
    let itemsPerPage = parseInt(document.getElementById('rows-per-page')?.value || 5);

    // Load orders from API
    async function loadOrders() {
       try {
          const params = {
             status: currentStatus,
             search: searchQuery || undefined,
             per_page: 100, // Get all for client-side filtering
          };
          
          // Map sort option to API parameters
          if (sortOption === 'newest') {
             params.sort_by = 'created_at';
             params.sort_order = 'desc';
          } else if (sortOption === 'oldest') {
             params.sort_by = 'created_at';
             params.sort_order = 'asc';
          } else if (sortOption === 'highest') {
             params.sort_by = 'total';
             params.sort_order = 'desc';
          }
          
          const response = await ordersAPI.getAllOrders(params);
          allOrders = response.data || [];
          renderOrders();
       } catch (error) {
          console.error('Error loading orders:', error);
          showToast('Failed to load orders', 'error');
          allOrders = [];
          renderOrders();
       }
    }

    window.resetFilters = () => {
       document.getElementById('order-search').value = '';
       document.getElementById('sort-order').value = 'newest';
       searchQuery = '';
       sortOption = 'newest';
       currentStatus = 'all';
       currentPage = 1;

       // Update Tabs
       document.querySelectorAll('.order-tab').forEach(tab => {
          const text = tab.innerText.replace(' Orders', '').trim();
          if (text === 'All') {
             tab.classList.add('active');
             tab.classList.remove('text-gray-400', 'border-transparent');
          } else {
             tab.classList.remove('active');
             tab.classList.add('text-gray-400', 'border-transparent');
          }
       });

       loadOrders();
    };

    window.manageOrder = async (id) => {
       try {
          const order = await ordersAPI.getOne(id);
          
          document.getElementById('modal-order-id').innerText = `Order #${order.id}`;
          document.getElementById('modal-order-date').innerText = new Date(order.created_at).toLocaleDateString('en-PH', {
             year: 'numeric',
             month: 'short',
             day: 'numeric'
          });
          document.getElementById('modal-customer-name').innerText = order.user.name;
          document.getElementById('modal-payment-method').innerText = order.payment_method.toUpperCase();
          document.getElementById('modal-total-amount').innerText = formatPrice(order.total);
          document.getElementById('modal-update-status').value = order.status;

          const statusBadge = document.getElementById('modal-order-status');
          statusBadge.innerText = order.status.charAt(0).toUpperCase() + order.status.slice(1);
          statusBadge.className = `px-2.5 py-1 rounded-full text-[9px] font-black uppercase tracking-widest border badge-${order.status.toLowerCase()}`;

          // Render order items
          const itemBody = document.getElementById('modal-order-items');
          itemBody.innerHTML = order.items.map(item => `
             <tr class="border-b border-gray-50">
                <td class="px-6 py-4">
                   <p class="text-xs font-bold text-gray-900">${item.product.name}</p>
                   <p class="text-[9px] text-gray-400 font-bold uppercase tracking-wider">Product ID: ${item.product_id}</p>
                </td>
                <td class="px-6 py-4 text-xs font-bold text-gray-500">${formatPrice(item.price)}</td>
                <td class="px-6 py-4 text-xs font-bold text-gray-500">${item.quantity}</td>
                <td class="px-6 py-4 text-right text-xs font-black text-gray-900">${formatPrice(item.price * item.quantity)}</td>
             </tr>
          `).join('');

          document.getElementById('order-modal').classList.remove('hidden');
       } catch (error) {
          console.error('Error loading order details:', error);
          showToast('Failed to load order details', 'error');
       }
    };

    window.closeOrderModal = () => {
       document.getElementById('order-modal').classList.add('hidden');
    };

    window.updateOrderStatus = async () => {
       const orderIdText = document.getElementById('modal-order-id').innerText;
       const id = orderIdText.replace('Order #', '');
       const newStatus = document.getElementById('modal-update-status').value;
       
       try {
          await ordersAPI.updateStatus(id, { status: newStatus });
          showToast(`Order #${id} updated to ${newStatus}`, 'success');
          closeOrderModal();
          await loadOrders();
       } catch (error) {
          console.error('Error updating order status:', error);
          const message = error.response?.data?.message || 'Failed to update order status';
          showToast(message, 'error');
       }
    };

    window.printInvoice = () => {
      const orderIdElement = document.getElementById('modal-order-id');
      if (!orderIdElement) {
        alert('Error: Could not find order ID element');
        return;
      }
      
      const orderId = orderIdElement.innerText.replace(/order\s+#?/i, '');
      const order = allOrders.find(o => o.id == orderId);
      
      if (!order) {
        alert('Error: Could not find order with ID ' + orderId);
        return;
      }

      const currentDate = new Date().toLocaleDateString('en-PH', { 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric' 
      });

      const formattedTotal = formatPrice(order.total);

      // Create print window content
      const printWindow = window.open('', '', 'width=800,height=600');
      printWindow.document.write(`
        <!DOCTYPE html>
        <html>
        <head>
          <title>Invoice #${orderId}</title>
          <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body { 
              font-family: 'Arial', sans-serif; 
              padding: 40px; 
              color: #333;
              font-size: 12px;
            }
            .invoice-header { 
              display: flex; 
              justify-content: space-between; 
              align-items: flex-start;
              margin-bottom: 40px; 
              padding-bottom: 20px;
              border-bottom: 3px solid #16a34a;
            }
            .company-info h1 { 
              font-size: 28px; 
              font-weight: bold; 
              color: #16a34a;
              margin-bottom: 5px;
            }
            .company-info p { 
              font-size: 11px; 
              color: #666; 
              line-height: 1.6;
            }
            .invoice-info { 
              text-align: right; 
            }
            .invoice-info h2 { 
              font-size: 16px; 
              font-weight: bold;
              margin-bottom: 10px;
            }
            .invoice-info p { 
              font-size: 11px; 
              margin-bottom: 5px;
            }
            .details-section {
              display: flex;
              justify-content: space-between;
              margin-bottom: 40px;
            }
            .section-box {
              flex: 1;
              padding: 15px;
              background: #f9fafb;
              border-radius: 8px;
              margin-right: 20px;
            }
            .section-box:last-child { margin-right: 0; }
            .section-box h3 {
              font-size: 11px;
              font-weight: bold;
              text-transform: uppercase;
              color: #666;
              margin-bottom: 10px;
              letter-spacing: 0.5px;
            }
            .section-box p {
              font-size: 12px;
              line-height: 1.8;
              color: #333;
            }
            table { 
              width: 100%; 
              border-collapse: collapse; 
              margin-bottom: 30px;
            }
            th { 
              background: #f3f4f6; 
              padding: 12px; 
              text-align: left; 
              font-size: 10px;
              font-weight: bold;
              text-transform: uppercase;
              letter-spacing: 0.5px;
              color: #666;
              border-bottom: 2px solid #e5e7eb;
            }
            th:last-child, td:last-child { text-align: right; }
            td { 
              padding: 15px 12px; 
              border-bottom: 1px solid #f3f4f6;
              font-size: 12px;
            }
            .item-name { font-weight: 600; color: #111; }
            .item-sku { 
              font-size: 10px; 
              color: #999; 
              margin-top: 3px;
              font-weight: normal;
            }
            .total-section {
              margin-top: 20px;
              padding-top: 20px;
              border-top: 2px solid #e5e7eb;
            }
            .total-row {
              display: flex;
              justify-content: flex-end;
              padding: 8px 0;
              font-size: 13px;
            }
            .total-row.grand {
              font-size: 16px;
              font-weight: bold;
              padding: 12px 0;
              margin-top: 10px;
              border-top: 2px solid #16a34a;
              color: #16a34a;
            }
            .total-label {
              width: 150px;
              text-align: right;
              padding-right: 20px;
            }
            .total-value {
              width: 120px;
              text-align: right;
              font-weight: 600;
            }
            .footer {
              margin-top: 60px;
              padding-top: 20px;
              border-top: 1px solid #e5e7eb;
              text-align: center;
              color: #999;
              font-size: 10px;
            }
            .status-badge {
              display: inline-block;
              padding: 4px 12px;
              border-radius: 12px;
              font-size: 9px;
              font-weight: bold;
              text-transform: uppercase;
              letter-spacing: 0.5px;
            }
            .status-pending { background: #fef3c7; color: #92400e; }
            .status-processing { background: #dbeafe; color: #1e40af; }
            .status-shipped { background: #dcfce7; color: #166534; }
            .status-completed { background: #d1fae5; color: #065f46; }
            .status-cancelled { background: #fee2e2; color: #991b1b; }
            @media print {
              body { padding: 20px; }
            }
          </style>
        </head>
        <body>
          <div class="invoice-header">
            <div class="company-info">
              <h1>DealMindanao</h1>
              <p>Regional Marketplace for Mindanao</p>
              <p>Email: hello@dealmindanao.ph</p>
              <p>Phone: +63 XXX XXX XXXX</p>
            </div>
            <div class="invoice-info">
              <h2>INVOICE</h2>
              <p><strong>Invoice #:</strong> ${orderId}</p>
              <p><strong>Date:</strong> ${order.date}</p>
              <p><strong>Printed:</strong> ${currentDate}</p>
              <p class="status-badge status-${order.status.toLowerCase()}">${order.status}</p>
            </div>
          </div>

          <div class="details-section">
            <div class="section-box">
              <h3>Bill To</h3>
              <p><strong>${order.customer}</strong></p>
              <p>Customer ID: ${orderId.replace('#DM-', 'CUST-')}</p>
            </div>
            <div class="section-box">
              <h3>Payment Information</h3>
              <p><strong>Method:</strong> ${order.method}</p>
              <p><strong>Status:</strong> ${order.status === 'Completed' ? 'Paid' : 'Pending'}</p>
            </div>
          </div>

          <table>
            <thead>
              <tr>
                <th>Item Description</th>
                <th style="width: 100px;">Price</th>
                <th style="width: 80px;">Quantity</th>
                <th style="width: 120px;">Subtotal</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>
                  <div class="item-name">Customized Mindanao Souvenir Set</div>
                  <div class="item-sku">SKU: DM-SOUV-001</div>
                </td>
                <td>${formattedTotal}</td>
                <td>1</td>
                <td>${formattedTotal}</td>
              </tr>
            </tbody>
          </table>

          <div class="total-section">
            <div class="total-row">
              <div class="total-label">Subtotal:</div>
              <div class="total-value">${formattedTotal}</div>
            </div>
            <div class="total-row">
              <div class="total-label">Shipping:</div>
              <div class="total-value">FREE</div>
            </div>
            <div class="total-row grand">
              <div class="total-label">TOTAL:</div>
              <div class="total-value">${formattedTotal}</div>
            </div>
          </div>

          <div class="footer">
            <p>Thank you for your business with DealMindanao!</p>
            <p>For questions about this invoice, please contact hello@dealmindanao.ph</p>
          </div>
        </body>
        </html>
      `);
      
      printWindow.document.close();
      setTimeout(() => {
        printWindow.print();
      }, 250);
    };

    window.filterStatus = (status) => {
       currentStatus = status.toLowerCase();
       currentPage = 1;
       
       // Update UI
       document.querySelectorAll('.order-tab').forEach(tab => {
          const text = tab.innerText.replace(' Orders', '').trim();
          if (text.toLowerCase() === status.toLowerCase()) {
             tab.classList.add('active');
             tab.classList.remove('text-gray-400', 'border-transparent');
          } else {
             tab.classList.remove('active');
             tab.classList.add('text-gray-400', 'border-transparent');
          }
       });

       loadOrders();
    };

    window.exportCSV = () => {
       showToast('Generating CSV report...');
    };

    function renderOrders() {
       const body = document.getElementById('order-list-body');
       const paginationInfo = document.getElementById('pagination-info');
       const prevBtn = document.getElementById('prev-page');
       const nextBtn = document.getElementById('next-page');
       if (!body) return;

       // Paginate (all filtering done server-side)
       const totalItems = allOrders.length;
       const totalPages = Math.ceil(totalItems / itemsPerPage) || 1;
       if (currentPage > totalPages) currentPage = totalPages;

       const start = (currentPage - 1) * itemsPerPage;
       const end = start + itemsPerPage;
       const paginatedItems = allOrders.slice(start, end);

       // Update UI
       if (paginatedItems.length === 0) {
          body.innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-gray-400 font-bold italic">No orders found matching filters</td></tr>`;
       } else {
          body.innerHTML = paginatedItems.map(o => {
             const orderDate = new Date(o.created_at).toLocaleDateString('en-PH', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
             });
             
             return `
             <tr class="hover:bg-gray-50/50 transition-colors">
                <td class="px-6 py-5 text-xs font-black text-gray-400 uppercase tracking-widest">#${o.id}</td>
                <td class="px-6 py-5">
                   <p class="font-bold text-gray-900">${o.user.name}</p>
                   <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">${o.user.email}</p>
                </td>
                <td class="px-6 py-5 text-sm font-bold text-gray-500">${orderDate}</td>
                <td class="px-6 py-5 font-black text-gray-900">${formatPrice(o.total)}</td>
                <td class="px-6 py-5"><span class="text-[10px] font-bold uppercase py-1 px-2 bg-gray-100 rounded-lg text-gray-600">${o.payment_method.toUpperCase()}</span></td>
                <td class="px-6 py-5">
                   <span class="badge-${o.status.toLowerCase()} text-[10px]">${o.status.charAt(0).toUpperCase() + o.status.slice(1)}</span>
                </td>
                <td class="px-6 py-5 text-right">
                   <button onclick="manageOrder(${o.id})" class="text-brand-600 font-bold text-xs uppercase hover:underline">Manage</button>
                </td>
             </tr>
          `;
          }).join('');
       }

       // Update pagination controls
       const currentEnd = Math.min(end, totalItems);
       paginationInfo.textContent = `Showing ${totalItems === 0 ? 0 : start + 1}-${currentEnd} of ${totalItems} orders`;
       
       prevBtn.disabled = currentPage === 1;
       prevBtn.style.opacity = currentPage === 1 ? '0.5' : '1';
       prevBtn.style.cursor = currentPage === 1 ? 'not-allowed' : 'pointer';
       
       nextBtn.disabled = currentPage === totalPages;
       nextBtn.style.opacity = currentPage === totalPages ? '0.5' : '1';
       nextBtn.style.cursor = currentPage === totalPages ? 'not-allowed' : 'pointer';
    }

    // Event Listeners
    document.getElementById('order-search')?.addEventListener('input', (e) => {
       searchQuery = e.target.value;
       currentPage = 1;
       loadOrders();
    });

    document.getElementById('sort-order')?.addEventListener('change', (e) => {
       sortOption = e.target.value;
       currentPage = 1;
       loadOrders();
    });

    document.getElementById('rows-per-page')?.addEventListener('change', (e) => {
       itemsPerPage = parseInt(e.target.value);
       currentPage = 1;
       renderOrders();
    });

    document.getElementById('prev-page')?.addEventListener('click', () => {
       if (currentPage > 1) {
          currentPage--;
          renderOrders();
       }
    });

    document.getElementById('next-page')?.addEventListener('click', () => {
       const totalPages = Math.ceil(allOrders.length / itemsPerPage);
       if (currentPage < totalPages) {
          currentPage++;
          renderOrders();
       }
    });

    // Export to CSV function
    window.exportCSV = () => {
      if (allOrders.length === 0) {
        showToast('No orders to export', 'error');
        return;
      }

      // CSV Headers
      const headers = ['Order ID', 'Customer', 'Email', 'Date', 'Amount', 'Payment Method', 'Status'];
      
      // CSV Rows
      const rows = allOrders.map(order => {
        const date = new Date(order.created_at).toLocaleDateString('en-PH');
        return [
          `#${order.id}`,
          order.user.name,
          order.user.email,
          date,
          `₱${order.total.toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`,
          order.payment_method.toUpperCase(),
          order.status.charAt(0).toUpperCase() + order.status.slice(1)
        ];
      });

      // Combine headers and rows
      const csvContent = [headers.join(','), ...rows.map(row => row.map(cell => `"${cell}"`).join(','))].join('\n');

      // Create blob and download
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      
      const timestamp = new Date().toISOString().split('T')[0];
      const filename = `dealmindanao_orders_${currentStatus}_${timestamp}.csv`;
      
      link.setAttribute('href', url);
      link.setAttribute('download', filename);
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      showToast(`Exported ${allOrders.length} orders to CSV`, 'success');
    };

    // Initial load
    loadOrders();
    initEnvBanner();
  </script>
</body>
</html>
