<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;">
  <title>Products - DealMindanao Admin</title>
  <link rel="stylesheet" href="/src/css/app.css">
</head>
<body class="admin-layout">
  <div id="sidebar"></div>

  <main class="admin-main">
    <header class="admin-header">
      <div>
        <h1 class="text-xl font-black text-gray-900">Products</h1>
        <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mt-1">Manage Store Inventory</p>
      </div>
      <div class="flex items-center gap-4">
        <button onclick="openProductModal()" class="btn-primary flex items-center gap-2">
           <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
           Add Product
        </button>
      </div>
    </header>

    <div class="admin-content">
      <!-- Filters & Search -->
      <div class="mb-8 flex flex-col md:flex-row gap-4 items-center justify-between">
         <div class="relative w-full md:w-96">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
               <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </span>
            <input type="text" id="product-search" placeholder="Search products, SKUs, or partners..." class="input pl-11">
         </div>
         <div class="flex gap-2 w-full md:w-auto">
            <select id="filter-category" class="input py-2 text-xs font-bold uppercase tracking-wider">
               <option value="">All Categories</option>
               <option value="Food">Food & Delicacies</option>
               <option value="Crafts">Handicrafts</option>
               <option value="Drinks">Drinks</option>
            </select>
            <select id="filter-status" class="input py-2 text-xs font-bold uppercase tracking-wider">
               <option value="">All Statuses</option>
               <option value="Active">Active</option>
               <option value="Low">Low Stock</option>
               <option value="Out">Out of Stock</option>
            </select>
            <button onclick="resetFilters()" class="btn-secondary px-4 py-2 text-[10px] font-black uppercase tracking-widest flex items-center gap-2 whitespace-nowrap">
               <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
               Reset
            </button>
         </div>
      </div>

      <!-- Products Table -->
      <div class="bg-white rounded-lg border border-gray-100 shadow-sm overflow-hidden">
         <div class="overflow-x-auto">
            <table class="data-table">
               <thead>
                  <tr>
                     <th>Product</th>
                     <th>Category</th>
                     <th>Partner</th>
                     <th>Price</th>
                     <th>Stock</th>
                     <th>Status</th>
                     <th class="text-right">Actions</th>
                  </tr>
               </thead>
               <tbody id="product-list-body">
                  <!-- Skeletons -->
                  <tr class="animate-pulse">
                     <td class="px-6 py-4"><div class="h-10 bg-gray-100 rounded-lg w-40"></div></td>
                     <td class="px-6 py-4"><div class="h-4 bg-gray-50 rounded-lg w-20"></div></td>
                     <td class="px-6 py-4"><div class="h-4 bg-gray-50 rounded-lg w-24"></div></td>
                     <td class="px-6 py-4"><div class="h-4 bg-gray-50 rounded-lg w-16"></div></td>
                     <td class="px-6 py-4"><div class="h-4 bg-gray-50 rounded-lg w-12"></div></td>
                     <td class="px-6 py-4"><div class="h-6 bg-gray-50 rounded-full w-16"></div></td>
                     <td class="px-6 py-4 text-right"><div class="ml-auto h-8 bg-gray-50 rounded-lg w-20"></div></td>
                  </tr>
               </tbody>
            </table>
         </div>
         
         <!-- Pagination -->
         <div class="p-6 border-t border-gray-50 flex items-center justify-between">
            <div class="flex items-center gap-4">
               <span id="pagination-info" class="text-xs font-bold text-gray-400 uppercase tracking-widest">Showing 1-10 of 42 products</span>
               <div class="h-4 w-px bg-gray-200"></div>
               <div class="flex items-center gap-2">
                  <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Rows:</span>
                  <select id="rows-per-page" class="bg-transparent border-none text-xs font-black text-gray-900 focus:ring-0 cursor-pointer">
                     <option value="5">5</option>
                     <option value="10" selected>10</option>
                     <option value="20">20</option>
                     <option value="50">50</option>
                  </select>
               </div>
            </div>
            <div class="flex gap-2">
               <button id="prev-page" class="btn-secondary btn-sm opacity-50 cursor-not-allowed">Previous</button>
               <button id="next-page" class="btn-secondary btn-sm">Next</button>
            </div>
         </div>
      </div>
  </main>

  <!-- Product Modal (Add/Edit) -->
  <div id="product-modal" class="fixed inset-0 z-[999] hidden" role="dialog" aria-modal="true">
     <!-- Backdrop -->
     <div class="fixed inset-0 bg-black/60 backdrop-blur-sm" onclick="closeProductModal()"></div>
     
     <!-- Modal Content -->
     <div class="fixed inset-0 pointer-events-none flex items-center justify-center p-4">
        <div class="pointer-events-auto bg-white w-full max-w-2xl rounded-lg shadow-2xl overflow-hidden transform transition-all">
           <form id="product-form" class="flex flex-col max-h-[90vh]">
              <input type="hidden" name="id" id="product-id">
              <div class="p-8 overflow-y-auto">
                 <div class="flex justify-between items-center mb-8">
                    <h3 id="modal-title" class="text-2xl font-black text-gray-900 uppercase tracking-tighter">Add New Product</h3>
                    <button type="button" onclick="closeProductModal()" class="text-gray-400 hover:text-gray-600 transition-colors">
                       <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                 </div>
                 
                 <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pb-4">
                    <div class="md:col-span-2">
                       <label class="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2">Product Name</label>
                       <input type="text" name="name" required placeholder="e.g. Premium Davao Durian" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all outline-none text-gray-900">
                    </div>
                    
                    <div>
                       <label class="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2">Category</label>
                       <select name="category" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all outline-none text-gray-900">
                          <option value="">Select Category</option>
                          <option value="Food">Food & Delicacies</option>
                          <option value="Crafts">Handicrafts</option>
                          <option value="Health">Health & Wellness</option>
                       </select>
                    </div>

                    <div>
                       <label class="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2">Partner / Vendor</label>
                       <select name="partner" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all outline-none text-gray-900">
                          <option value="">Select Partner</option>
                          <option value="DavaoTreats">Davao Treats</option>
                          <option value="LakeSebuArts">Lake Sebu Arts</option>
                          <option value="CDORoasters">CDO Roasters</option>
                          <option value="MindanaoWellness">Mindanao Wellness</option>
                          <option value="MindanaoGifts">Mindanao Gifts</option>
                       </select>
                    </div>

                    <div>
                       <label class="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2">Price (₱)</label>
                       <input type="number" name="price" required step="0.01" placeholder="250.00" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all outline-none text-gray-900">
                    </div>

                    <div>
                       <label class="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2">Stock Level</label>
                       <input type="number" name="stock" required placeholder="100" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all outline-none text-gray-900">
                    </div>

                    <div class="md:col-span-2">
                       <label class="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2">Description</label>
                       <textarea name="description" rows="3" placeholder="Detailed product description..." class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all outline-none text-gray-900"></textarea>
                    </div>

                    <div class="md:col-span-2">
                       <label class="block text-xs font-black text-gray-500 uppercase tracking-widest mb-2">Product Images (URLs)</label>
                       <div id="image-inputs-container" class="space-y-2">
                          <div class="flex gap-2">
                             <input type="url" name="image-url-1" placeholder="https://example.com/image1.jpg" class="flex-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all outline-none text-gray-900">
                             <button type="button" onclick="removeImageInput(this)" class="text-red-500 hover:text-red-700 transition-colors px-3">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                             </button>
                          </div>
                       </div>
                       <button type="button" onclick="addImageInput()" class="mt-2 text-xs font-bold text-brand-600 hover:text-brand-700 flex items-center gap-1">
                          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                          Add Another Image
                       </button>
                    </div>
                 </div>
              </div>
              
              <div class="bg-gray-50 px-8 py-6 flex flex-row-reverse gap-3 border-t border-gray-100">
                 <button type="submit" class="btn-primary px-8 py-3 rounded-lg font-bold">Save Product</button>
                 <button type="button" onclick="closeProductModal()" class="px-8 py-3 text-sm font-bold text-gray-500 hover:text-gray-700 transition-colors">Cancel</button>
              </div>
           </form>
        </div>
     </div>
  </div>

  <script type="module" src="/src/js/layout.js"></script>
  <script type="module">
    import { formatPrice, showToast } from '/src/js/utils.js';
    import { products as productsAPI, categories, companies } from '/src/js/api.js';

    let allProducts = [];
    let allCategories = [];
    let allCompanies = [];
    let currentPage = 1;
    let itemsPerPage = 10;

    // Load products from API
    async function loadProducts() {
      try {
        const response = await productsAPI.getAll();
        allProducts = response.data.map(p => ({
          id: p.id,
          name: p.name,
          cat: p.category?.name || 'Uncategorized',
          partner: p.company?.name || 'Unknown',
          price: parseFloat(p.price),
          stock: p.stock || 0,
          status: (p.stock || 0) > 10 ? 'Active' : ((p.stock || 0) > 0 ? 'Low' : 'Out'),
          description: p.description || '',
          slug: p.slug,
          images: p.images,
          category_id: p.category?.id,
          company_id: p.company?.id
        }));
        renderProducts();
      } catch (error) {
        console.error('Error loading products:', error);
        document.getElementById('product-list-body').innerHTML = 
          '<tr><td colspan="7" class="px-6 py-8 text-center text-red-500 font-bold">Failed to load products</td></tr>';
      }
    }
    
    // Load categories and companies for form dropdowns
    async function loadFormData() {
      try {
        const [categoriesResponse, companiesResponse] = await Promise.all([
          categories.getAll(),
          companies.getAll()
        ]);
        
        allCategories = Array.isArray(categoriesResponse) ? categoriesResponse : categoriesResponse.data || [];
        allCompanies = Array.isArray(companiesResponse) ? companiesResponse : companiesResponse.data || [];
        
        // Update category filter
        const categoryFilter = document.getElementById('filter-category');
        categoryFilter.innerHTML = '<option value="">All Categories</option>' + 
          allCategories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
        
        // Update form category select
        const categorySelect = document.querySelector('select[name="category"]');
        categorySelect.innerHTML = '<option value="">Select Category</option>' + 
          allCategories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        
        // Update form company select
        const companySelect = document.querySelector('select[name="partner"]');
        companySelect.innerHTML = '<option value="">Select Partner</option>' + 
          allCompanies.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
      } catch (error) {
        console.error('Error loading form data:', error);
      }
    }

    // Global Modal Functions
    window.openProductModal = () => {
       const modal = document.getElementById('product-modal');
       if (modal) {
          modal.classList.remove('hidden');
          modal.style.display = 'block';
          document.body.style.overflow = 'hidden';
       }
    };

    window.closeProductModal = () => {
       const modal = document.getElementById('product-modal');
       const form = document.getElementById('product-form');
       if (modal) {
          modal.classList.add('hidden');
          modal.style.display = 'none';
          document.body.style.overflow = '';
       }
       if (form) {
          form.reset();
          document.getElementById('product-id').value = '';
          document.getElementById('modal-title').textContent = 'Add New Product';
          form.querySelector('button[type="submit"]').textContent = 'Save Product';
          
          // Reset image inputs to just one
          const container = document.getElementById('image-inputs-container');
          container.innerHTML = `
             <div class="flex gap-2">
                <input type="url" name="image-url-1" placeholder="https://example.com/image1.jpg" class="flex-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all outline-none text-gray-900">
                <button type="button" onclick="removeImageInput(this)" class="text-red-500 hover:text-red-700 transition-colors px-3">
                   <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
             </div>
          `;
       }
    };

    // Image input management
    window.addImageInput = () => {
       const container = document.getElementById('image-inputs-container');
       const currentCount = container.querySelectorAll('input[type="url"]').length;
       const newIndex = currentCount + 1;
       
       const newInput = document.createElement('div');
       newInput.className = 'flex gap-2';
       newInput.innerHTML = `
          <input type="url" name="image-url-${newIndex}" placeholder="https://example.com/image${newIndex}.jpg" class="flex-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all outline-none text-gray-900">
          <button type="button" onclick="removeImageInput(this)" class="text-red-500 hover:text-red-700 transition-colors px-3">
             <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
          </button>
       `;
       container.appendChild(newInput);
    };

    window.removeImageInput = (button) => {
       const container = document.getElementById('image-inputs-container');
       const inputGroups = container.querySelectorAll('.flex');
       
       // Keep at least one input
       if (inputGroups.length > 1) {
          button.closest('.flex').remove();
       } else {
          // Just clear the value if it's the last one
          container.querySelector('input[type="url"]').value = '';
       }
    };

    // Collect image URLs from the form
    function collectImageUrls() {
       const inputs = document.querySelectorAll('#image-inputs-container input[type="url"]');
       const urls = [];
       
       inputs.forEach(input => {
          const url = input.value.trim();
          if (url) {
             urls.push(url);
          }
       });
       
       return urls.length > 0 ? urls : null;
    }

    window.editProduct = (id) => {
       const p = allProducts.find(prod => prod.id == id);
       if (!p) return;

       document.getElementById('product-id').value = p.id;
       document.getElementById('modal-title').textContent = 'Edit Product';
       
       const form = document.getElementById('product-form');
       form.querySelector('button[type="submit"]').textContent = 'Update Product';
       
       // Populate fields
       form.elements['name'].value = p.name;
       form.elements['category'].value = p.category_id || '';
       form.elements['partner'].value = p.company_id || '';
       form.elements['price'].value = p.price;
       form.elements['stock'].value = p.stock;
       form.elements['description'].value = p.description || '';

       // Populate image URLs
       const container = document.getElementById('image-inputs-container');
       const images = p.images || [];
       
       if (images.length > 0) {
          container.innerHTML = images.map((url, index) => `
             <div class="flex gap-2">
                <input type="url" name="image-url-${index + 1}" value="${url}" placeholder="https://example.com/image${index + 1}.jpg" class="flex-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all outline-none text-gray-900">
                <button type="button" onclick="removeImageInput(this)" class="text-red-500 hover:text-red-700 transition-colors px-3">
                   <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
             </div>
          `).join('');
       }

       openProductModal();
    };    
    window.deleteProduct = async (id) => {
       const product = allProducts.find(p => p.id == id);
       if (!product) return;
       
       if (!confirm(`Are you sure you want to delete "${product.name}"?\n\nThis action cannot be undone.`)) {
          return;
       }
       
       try {
          await productsAPI.delete(id);
          showToast('Product deleted successfully', 'success');
          loadProducts(); // Reload list
       } catch (error) {
          console.error('Error deleting product:', error);
          const message = error.response?.data?.message || 'Failed to delete product';
          showToast(message, 'error');
       }
    };
    window.resetFilters = () => {
       document.getElementById('product-search').value = '';
       document.getElementById('filter-category').value = '';
       document.getElementById('filter-status').value = '';
       currentPage = 1;
       renderProducts();
    };

    function renderProducts() {
       const body = document.getElementById('product-list-body');
       const paginationInfo = document.getElementById('pagination-info');
       const prevBtn = document.getElementById('prev-page');
       const nextBtn = document.getElementById('next-page');
       
       if (!body) return;
       
       const search = document.getElementById('product-search').value.toLowerCase();
       const catFilter = document.getElementById('filter-category').value;
       const statusFilter = document.getElementById('filter-status').value;

       // 1. Filter
       const filtered = allProducts.filter(p => {
          const matchesSearch = p.name.toLowerCase().includes(search) || p.partner.toLowerCase().includes(search);
          const matchesCat = !catFilter || p.cat === catFilter;
          const matchesStatus = !statusFilter || p.status === statusFilter;
          return matchesSearch && matchesCat && matchesStatus;
       });

       // 2. Paginate
       const totalItems = filtered.length;
       const totalPages = Math.ceil(totalItems / itemsPerPage) || 1;
       if (currentPage > totalPages) currentPage = totalPages;

       const start = (currentPage - 1) * itemsPerPage;
       const end = start + itemsPerPage;
       const paginatedItems = filtered.slice(start, end);

       // 3. Update Table
       if (paginatedItems.length === 0) {
          body.innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-gray-400 font-bold italic">No products found matching filters</td></tr>`;
       } else {
          body.innerHTML = paginatedItems.map(p => `
             <tr>
                <td class="px-6 py-4 font-bold text-gray-900">${p.name}</td>
                <td class="px-6 py-4">${p.cat}</td>
                <td class="px-6 py-4 text-xs font-bold text-brand-600 uppercase">${p.partner}</td>
                <td class="px-6 py-4 font-mono text-gray-900">₱${p.price}</td>
                <td class="px-6 py-4">${p.stock}</td>
                <td class="px-6 py-4">
                   <span class="badge-${p.status.toLowerCase()}">${p.status}</span>
                </td>
                <td class="px-6 py-4 text-right">
                   <div class="flex items-center justify-end gap-2">
                      <button onclick="editProduct(${p.id})" class="text-gray-400 hover:text-brand-600 font-bold text-xs uppercase tracking-widest transition-colors">Edit</button>
                      <span class="text-gray-200">|</span>
                      <button onclick="deleteProduct(${p.id})" class="text-gray-400 hover:text-red-600 font-bold text-xs uppercase tracking-widest transition-colors">Delete</button>
                   </div>
                </td>
             </tr>
          `).join('');
       }

       // 4. Update Pagination Controls
       const currentEnd = Math.min(end, totalItems);
       paginationInfo.textContent = `Showing ${totalItems === 0 ? 0 : start + 1}-${currentEnd} of ${totalItems} products`;
       
       prevBtn.disabled = currentPage === 1;
       prevBtn.style.opacity = currentPage === 1 ? '0.5' : '1';
       prevBtn.style.cursor = currentPage === 1 ? 'not-allowed' : 'pointer';
       
       nextBtn.disabled = currentPage === totalPages;
       nextBtn.style.opacity = currentPage === totalPages ? '0.5' : '1';
       nextBtn.style.cursor = currentPage === totalPages ? 'not-allowed' : 'pointer';
    }

    // Event Listeners for searching & filtering
    document.getElementById('product-search').addEventListener('input', () => {
       currentPage = 1;
       renderProducts();
    });
    document.getElementById('filter-category').addEventListener('change', () => {
       currentPage = 1;
       renderProducts();
    });
    document.getElementById('filter-status').addEventListener('change', () => {
       currentPage = 1;
       renderProducts();
    });

    // Pagination Listeners
    document.getElementById('rows-per-page')?.addEventListener('change', (e) => {
       itemsPerPage = parseInt(e.target.value);
       currentPage = 1;
       renderProducts();
    });

    document.getElementById('prev-page')?.addEventListener('click', () => {
       if (currentPage > 1) {
          currentPage--;
          renderProducts();
       }
    });

    document.getElementById('next-page')?.addEventListener('click', () => {
       const filteredCount = allProducts.filter(p => {
          const search = document.getElementById('product-search').value.toLowerCase();
          const catFilter = document.getElementById('filter-category').value;
          const statusFilter = document.getElementById('filter-status').value;
          const matchesSearch = p.name.toLowerCase().includes(search) || p.partner.toLowerCase().includes(search);
          const matchesCat = !catFilter || p.cat === catFilter;
          const matchesStatus = !statusFilter || p.status === statusFilter;
          return matchesSearch && matchesCat && matchesStatus;
       }).length;

       if (currentPage < Math.ceil(filteredCount / itemsPerPage)) {
          currentPage++;
          renderProducts();
       }
    });

    // Load data on page load
    loadProducts();
    loadFormData();

    document.getElementById('product-form').addEventListener('submit', async (e) => {
       e.preventDefault();
       const formData = new FormData(e.target);
       const id = formData.get('id');
       const submitBtn = e.target.querySelector('button[type="submit"]');
       const originalText = submitBtn.textContent;
       
       // Prepare product data for API
       const productData = {
          name: formData.get('name'),
          category_id: parseInt(formData.get('category')),
          company_id: parseInt(formData.get('partner')),
          price: parseFloat(formData.get('price')),
          stock_quantity: parseInt(formData.get('stock')) || 0,
          description: formData.get('description') || null,
          images: collectImageUrls(), // Collect image URLs
       };
       
       // Validate required fields
       if (!productData.category_id || !productData.company_id) {
          showToast('Please select both category and partner', 'error');
          return;
       }
       
       // Disable submit button
       submitBtn.disabled = true;
       submitBtn.textContent = id ? 'Updating...' : 'Saving...';

       try {
          if (id) {
             // Update existing product
             await productsAPI.update(id, productData);
             showToast('Product updated successfully', 'success');
          } else {
             // Create new product
             await productsAPI.create(productData);
             showToast('Product created successfully', 'success');
          }
          
          // Reload product list and close modal
          await loadProducts();
          closeProductModal();
       } catch (error) {
          console.error('Error saving product:', error);
          const message = error.response?.data?.message || 'Failed to save product';
          showToast(message, 'error');
       } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
       }
    });
  </script>
</body>
</html>
