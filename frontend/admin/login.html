<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;">
  <title>Admin Login - DealMindanao</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/src/css/app.css">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-6">
  <div class="w-full max-w-md bg-white rounded-lg border border-gray-100 shadow-xl overflow-hidden">
     <div class="bg-brand-600 p-8 text-white text-center">
        <h1 class="text-2xl font-black italic tracking-tighter">DEALMINDANAO</h1>
        <p class="text-xs font-bold uppercase tracking-widest opacity-70 mt-2">Administrative Access</p>
     </div>
     
     <form class="p-8 space-y-6" id="login-form">
        <div id="error-message" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm font-bold"></div>
        
        <div>
           <label for="email" class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Email</label>
           <input type="email" id="email" name="email" class="input w-full" placeholder="Enter email" value="admin@dealmindanao.ph" required>
        </div>
        <div>
           <label for="password" class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Password</label>
           <input type="password" id="password" name="password" class="input w-full" placeholder="••••••••" value="password" required>
        </div>
        
        <button type="submit" id="submit-btn" class="btn-primary w-full py-4 rounded-lg font-black uppercase tracking-widest">
           Sign In
        </button>
        
        <p class="text-center text-xs text-gray-400 font-bold uppercase tracking-wider">
           Forgotten password? <a href="#" class="text-brand-600 hover:underline">Contact Support</a>
        </p>
     </form>
  </div>

  <script type="module">
    import { auth } from '/src/js/api.js';
    
    const form = document.getElementById('login-form');
    const submitBtn = document.getElementById('submit-btn');
    const errorMessage = document.getElementById('error-message');
    
    form.addEventListener('submit', async (e) => {
       e.preventDefault();
       
       // Get form data
       const email = document.getElementById('email').value;
       const password = document.getElementById('password').value;
       
       // Disable submit button
       submitBtn.disabled = true;
       submitBtn.textContent = 'Signing In...';
       errorMessage.classList.add('hidden');
       
       try {
          const data = await auth.login(email, password);
          
          // Check if user is admin
          if (!data.user.is_admin) {
             errorMessage.textContent = 'Access denied. Admin privileges required.';
             errorMessage.classList.remove('hidden');
             submitBtn.disabled = false;
             submitBtn.textContent = 'Sign In';
             localStorage.removeItem('auth_token');
             localStorage.removeItem('user');
             return;
          }
          
          // Redirect to dashboard
          window.location.href = '/admin/dashboard.html';
       } catch (error) {
          console.error('Login error:', error);
          
          let message = 'Login failed. Please try again.';
          if (error.response?.data?.errors?.email) {
             message = error.response.data.errors.email[0];
          } else if (error.response?.data?.message) {
             message = error.response.data.message;
          }
          
          errorMessage.textContent = message;
          errorMessage.classList.remove('hidden');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign In';
       }
    });
  </script>
</body>
</html>
